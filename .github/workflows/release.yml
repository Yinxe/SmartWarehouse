name: Build & Release .mcaddon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.1.0-beta)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync version
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"
          npm version "$VER" --no-git-tag-version --allow-same-version
          echo "Version synced to: $(node -p 'require("./package.json").version')"

      - name: Build & package .mcaddon
        run: npm run build
        env:
          PROJECT_NAME: SmartWarehouse

      - name: Create .env for mcaddon task
        run: |
          echo 'PROJECT_NAME="SmartWarehouse"' > .env
          echo 'MINECRAFT_PRODUCT="BedrockGDK"' >> .env

      - name: Create .mcaddon
        run: npx just-scripts mcaddon
        env:
          PROJECT_NAME: SmartWarehouse

      - name: Upload .mcaddon to release
        if: github.event_name == 'push'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/packages/SmartWarehouse-v*.mcaddon
          tag: ${{ github.ref_name }}
          overwrite: true
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}

      - name: Upload .mcaddon as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: SmartWarehouse-${{ inputs.version }}
          path: dist/packages/SmartWarehouse-v*.mcaddon
