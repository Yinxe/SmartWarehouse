name: Build & Release .mcaddon

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (如 0.1.0-beta)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          VER="${{ inputs.version || github.ref_name }}"
          VER="${VER#v}"
          echo "Building version: $VER"
          echo "VERSION=$VER" >> $GITHUB_ENV

          # Compile TypeScript
          npx tsc

          # Create .mcaddon (zip containing BP and RP)
          mkdir -p build/SmartWarehouse_BP/scripts
          cp -r BP/SmartWarehouse/* build/SmartWarehouse_BP/
          cp -r RP/SmartWarehouse/* build/SmartWarehouse_RP/
          cp -r lib/scripts/* build/SmartWarehouse_BP/scripts/
          cd build
          zip -r "../SmartWarehouse-v${VER}.mcaddon" .
          cd ..
          echo "Package created: SmartWarehouse-v${VER}.mcaddon"
          ls -lh "SmartWarehouse-v${VER}.mcaddon"

      - name: Upload to release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          IS_PRERELEASE=""
          if echo "${GITHUB_REF_NAME}" | grep -qiE 'beta|alpha|rc'; then IS_PRERELEASE="--prerelease"; fi
          gh release create "${GITHUB_REF_NAME}" \
            "SmartWarehouse-v${VERSION}.mcaddon" \
            --title "${GITHUB_REF_NAME}" \
            --notes "自动构建发布" \
            ${IS_PRERELEASE} \
            --target "${GITHUB_SHA}" 2>/dev/null || \
          gh release upload "${GITHUB_REF_NAME}" \
            "SmartWarehouse-v${VERSION}.mcaddon" --clobber

      - name: Upload as artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: SmartWarehouse-${{ inputs.version }}
          path: SmartWarehouse-v${{ env.VERSION }}.mcaddon
